<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form to Table</title>
    <style>
        /* Base styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        /* Form styling */
        form {
            display: grid;
            /* grid-template-columns: 1fr 1fr; */
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }

        input, select {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #3182ce;
        }

        button {
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        /* Display Table styling */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #edf2f7;
            color: #2d3748;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        .no-data {
            text-align: center;
            color: #a0aec0;
            font-style: italic;
        }

        .delete-btn {
            background-color: #e53e3e;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .delete-btn:hover {
            background-color: #c53030;
        }
    </style>
</head>
<body>

    <!-- 1. Input Form Container -->
    <div class="container">
        <h2>Add New User</h2>
        <form id="userForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input [(ngModel)]="name" name="name" type="text" id="fullName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input [(ngModel)]="email" name="email" type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input [(ngModel)]="age" name="age" type="number" id="age" required placeholder="18">
            </div>
            <div style="display: flex; justify-content: center; align-items: center;">
                <!-- <button type="submit" (click)="submitData()">Add to Table</button> -->
            </div>
        </form>
    </div>

    <!-- 2. Display Table Container -->
    <div class="container">
        <h2>Submitted Records</h2>
        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Age</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td>{{name}}</td>
                        <td>{{email}}</td>
                        <td>{{age}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
